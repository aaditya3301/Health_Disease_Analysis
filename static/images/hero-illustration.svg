<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Background Elements -->
  <rect x="280" y="60" width="180" height="240" rx="12" fill="#E0E7FF" stroke="#6366F1" stroke-width="2"/>
  <rect x="290" y="90" width="160" height="20" rx="4" fill="#C7D2FE"/>
  <rect x="290" y="120" width="120" height="12" rx="3" fill="#C7D2FE"/>
  <rect x="290" y="140" width="140" height="12" rx="3" fill="#C7D2FE"/>
  
  <!-- Chart bars -->
  <rect x="300" y="180" width="25" height="80" rx="4" fill="#4F46E5"/>
  <rect x="335" y="200" width="25" height="60" rx="4" fill="#818CF8"/>
  <rect x="370" y="170" width="25" height="90" rx="4" fill="#4F46E5"/>
  <rect x="405" y="210" width="25" height="50" rx="4" fill="#818CF8"/>
  
  <!-- Tablet/Screen -->
  <rect x="60" y="80" width="200" height="260" rx="16" fill="white" stroke="#4F46E5" stroke-width="2.5"/>
  <rect x="75" y="100" width="170" height="140" rx="8" fill="#EEF2FF"/>
  
  <!-- Heart icon on screen -->
  <path d="M160 140 C160 125 140 115 130 130 C120 115 100 125 100 140 C100 160 130 180 130 180 C130 180 160 160 160 140Z" fill="#EF4444" opacity="0.8"/>
  
  <!-- Chart on screen -->
  <rect x="85" y="195" width="15" height="30" rx="2" fill="#4F46E5"/>
  <rect x="108" y="185" width="15" height="40" rx="2" fill="#6366F1"/>
  <rect x="131" y="205" width="15" height="20" rx="2" fill="#818CF8"/>
  <rect x="154" y="190" width="15" height="35" rx="2" fill="#4F46E5"/>
  <rect x="177" y="200" width="15" height="25" rx="2" fill="#6366F1"/>
  
  <!-- Person 1 -->
  <circle cx="200" cy="340" r="20" fill="#4F46E5"/>
  <rect x="185" y="360" width="30" height="40" rx="8" fill="#4F46E5"/>
  <circle cx="200" cy="340" r="12" fill="#FED7AA"/>
  
  <!-- Person 2 -->
  <circle cx="120" cy="350" r="18" fill="#6366F1"/>
  <rect x="107" y="368" width="26" height="35" rx="7" fill="#6366F1"/>
  <circle cx="120" cy="350" r="10" fill="#FED7AA"/>
  
  <!-- Decorative circles -->
  <circle cx="420" cy="50" r="25" fill="#C7D2FE" opacity="0.5"/>
  <circle cx="50" cy="60" r="15" fill="#C7D2FE" opacity="0.4"/>
  <circle cx="460" cy="350" r="20" fill="#E0E7FF" opacity="0.6"/>
  
  <!-- Connection lines -->
  <line x1="260" y1="200" x2="280" y2="200" stroke="#818CF8" stroke-width="2" stroke-dasharray="4 4"/>
</svg>
